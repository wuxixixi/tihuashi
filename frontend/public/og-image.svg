<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDF5E6"/>
      <stop offset="100%" style="stop-color:#FEF9E7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#D2691E"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装饰边框 -->
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#DEB887" stroke-width="3"/>
  <rect x="45" y="45" width="1110" height="540" fill="none" stroke="#DEB887" stroke-width="1"/>

  <!-- 左侧装饰 - 山水画风格 -->
  <g transform="translate(80, 100)">
    <!-- 山 -->
    <path d="M0 350 Q50 200 100 280 Q150 180 200 250 Q250 150 300 220 L300 350 Z" fill="#8B4513" opacity="0.3"/>
    <path d="M50 350 Q100 250 150 300 Q200 220 250 270 L250 350 Z" fill="#A0522D" opacity="0.4"/>
    <!-- 云 -->
    <ellipse cx="80" cy="120" rx="60" ry="30" fill="#D2B48C" opacity="0.5"/>
    <ellipse cx="200" cy="80" rx="50" ry="25" fill="#D2B48C" opacity="0.4"/>
    <!-- 水 -->
    <path d="M0 350 Q75 340 150 350 Q225 360 300 350 L300 380 L0 380 Z" fill="#DEB887" opacity="0.5"/>
  </g>

  <!-- 右侧文字区域 -->
  <g transform="translate(450, 150)">
    <!-- 标题 -->
    <text x="0" y="80" font-family="KaiTi, STKaiti, 'Noto Serif SC', serif" font-size="72" font-weight="bold" fill="#3E2723">墨韵 AI</text>

    <!-- 副标题 -->
    <text x="0" y="150" font-family="'Noto Serif SC', serif" font-size="32" fill="#5D4037">中国画智能赏析与诗词创作</text>

    <!-- 分隔线 -->
    <line x1="0" y1="180" x2="400" y2="180" stroke="url(#accent)" stroke-width="2"/>

    <!-- 功能介绍 -->
    <text x="0" y="230" font-family="'Noto Serif SC', serif" font-size="24" fill="#6D4C41">✦ 上传中国画，AI 自动赏析画意</text>
    <text x="0" y="270" font-family="'Noto Serif SC', serif" font-size="24" fill="#6D4C41">✦ 智能创作题画诗，多种风格可选</text>
    <text x="0" y="310" font-family="'Noto Serif SC', serif" font-size="24" fill="#6D4C41">✦ 书法风格导出，名画动画生成</text>

    <!-- 底部标识 -->
    <text x="200" y="400" text-anchor="middle" font-family="'Noto Serif SC', serif" font-size="18" fill="#8D6E63">让古典艺术与现代 AI 完美融合</text>
  </g>

  <!-- 右下角印章 -->
  <g transform="translate(1050, 500)">
    <rect x="0" y="0" width="80" height="60" fill="none" stroke="#C41E3A" stroke-width="2"/>
    <text x="40" y="40" text-anchor="middle" font-family="KaiTi, serif" font-size="24" fill="#C41E3A">墨韵</text>
  </g>
</svg>
