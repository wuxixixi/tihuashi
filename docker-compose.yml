version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/history.json:/app/history.json
    environment:
      - PORT=3001

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
